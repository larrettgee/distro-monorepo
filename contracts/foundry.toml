[profile.default]
src = 'contracts'
out = 'out'
libs = ['node_modules', 'lib']
test = 'test'
cache_path = 'cache_forge'
solc_version = "0.8.34"
via_ir = true
optimizer = true
optimizer_runs = 200
fs_permissions = [
  { access = "read-write", path = "./deployments" },
  { access = "read", path = "./out" },
  { access = "read", path = "./broadcast" },
  { access = "read", path = "./" }
]

[fuzz]
runs = 1000
seed = "0xdeadbeef"

[invariant]
runs = 500
depth = 50

[rpc_endpoints]
arc = "${ARC_RPC_URL}"

# Arc testnet (arcscan) runs Blockscout, not Etherscan, so verification is driven
# by the deploy script's CLI flags (`--verifier blockscout --verifier-url ...`)
# rather than an [etherscan] table. See package.json `deploy:escrow`.
